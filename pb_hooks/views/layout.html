<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: 'Work Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 0; background: #F8F3DE; color: #1F1F1F; }
        .wrapper { padding: 32px 16px; }
        .container { max-width: 600px; margin: 0 auto; background: #FDFBF6; border-radius: 16px; border: 1px solid #EBE6D9; overflow: hidden; }
        .header { text-align: center; padding: 24px 20px; background: #EBE6D9; }
        .header img { height: 48px; margin: 0 auto; display: block; }
        .content { padding: 32px 24px; line-height: 1.7; font-size: 16px; color: #3A3A3A; }
        .footer { text-align: center; padding: 20px 24px; color: #6B6B6B; font-size: 13px; border-top: 1px solid #EBE6D9; }
        .footer p { margin: 0; }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="container">
            <div class="header">
                <img src="{{.APP_URL}}AllerLeih.png" alt="AllerLeih" />
            </div>
            <div class="content">
                {{raw .CONTENT}}
            </div>
            <div class="footer">
                <p><a href="https://allerleih.org/" style="color: #6B6B6B; text-decoration: none;">AllerLeih &mdash; Teilen statt Besitzen</a></p>
            </div>
        </div>
    </div>
</body>
</html>
